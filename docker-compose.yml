services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexbrain
      POSTGRES_PASSWORD: nexbrain
      POSTGRES_DB: nexbrain
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexbrain
      POSTGRES_PASSWORD: nexbrain
      POSTGRES_DB: nexbrain_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
