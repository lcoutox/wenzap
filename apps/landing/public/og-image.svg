<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00E09A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0B0F14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0F14"/>
  <!-- Glow -->
  <ellipse cx="600" cy="-60" rx="700" ry="400" fill="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="522" y="90" width="56" height="56" rx="14" fill="#00E09A"/>
  <text x="550" y="131" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#0B0F14" text-anchor="middle">W</text>

  <!-- Wordmark -->
  <text x="594" y="131" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#F9FAFB" text-anchor="start">enzap</text>

  <!-- Main headline line 1 -->
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#F9FAFB" text-anchor="middle" letter-spacing="-1">Agentes de IA trabalhando na</text>

  <!-- Main headline line 2 — "operação" in green -->
  <text x="600" y="295" font-family="Arial, sans-serif" font-size="52" font-weight="800" text-anchor="middle" letter-spacing="-1">
    <tspan fill="#00E09A">operação</tspan>
    <tspan fill="#F9FAFB"> da sua empresa</tspan>
  </text>

  <!-- Subline -->
  <text x="600" y="358" font-family="Arial, sans-serif" font-size="22" fill="#9CA3AF" text-anchor="middle">Atendimento, vendas e relacionamento com controle humano.</text>

  <!-- Pills background rects -->
  <!-- Base de Conhecimento -->
  <rect x="116" y="400" width="218" height="38" rx="19" fill="#002E20" stroke="#00E09A" stroke-opacity="0.3" stroke-width="1"/>
  <text x="225" y="424" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#00E09A" text-anchor="middle">Base de Conhecimento</text>

  <!-- Catálogo -->
  <rect x="350" y="400" width="118" height="38" rx="19" fill="#002E20" stroke="#00E09A" stroke-opacity="0.3" stroke-width="1"/>
  <text x="409" y="424" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#00E09A" text-anchor="middle">Catálogo</text>

  <!-- Inbox -->
  <rect x="484" y="400" width="96" height="38" rx="19" fill="#002E20" stroke="#00E09A" stroke-opacity="0.3" stroke-width="1"/>
  <text x="532" y="424" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#00E09A" text-anchor="middle">Inbox</text>

  <!-- WhatsApp -->
  <rect x="596" y="400" width="116" height="38" rx="19" fill="#002E20" stroke="#00E09A" stroke-opacity="0.3" stroke-width="1"/>
  <text x="654" y="424" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#00E09A" text-anchor="middle">WhatsApp</text>

  <!-- Web Widget -->
  <rect x="728" y="400" width="118" height="38" rx="19" fill="#002E20" stroke="#00E09A" stroke-opacity="0.3" stroke-width="1"/>
  <text x="787" y="424" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#00E09A" text-anchor="middle">Web Widget</text>

  <!-- Agentes IA -->
  <rect x="862" y="400" width="112" height="38" rx="19" fill="#002E20" stroke="#00E09A" stroke-opacity="0.3" stroke-width="1"/>
  <text x="918" y="424" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#00E09A" text-anchor="middle">Agentes IA</text>

  <!-- Bottom domain -->
  <text x="600" y="588" font-family="Arial, sans-serif" font-size="16" fill="#6B7280" text-anchor="middle">wenzap.com.br</text>
</svg>
